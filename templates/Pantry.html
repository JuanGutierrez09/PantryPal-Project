{% extends 'base.html' %}

{%block content %} 

<h2>My Pantry</h2>

{% if items %}
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Food</th>
                <th>Expiration Date</th>
                <th>Actions</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.name }}</td>
                <td>{{ item.expiration_date }}</td>
                <td>{{ item.status }}</td>
                <td>
                    <a href="/edit/{{ item.id }}" class="btn btn-primary btn-sm">Edit</a>
                    <form action="/delete/{{ item.id }}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% else %}
    <p>Your pantry is empty. Start adding some items!</p>
{% endif %}

{%endblock%}
